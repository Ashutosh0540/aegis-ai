name: aegis-ai

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: aegis_minio
      MINIO_ROOT_PASSWORD: aegis_minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      WEBHOOK_URL: http://n8n:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ../workflows/n8n:/home/node/imported-workflows:ro
    ports:
      - "5678:5678"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aegis:aegis@postgres:5432/aegis_ai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_ENDPOINT_URL: http://minio:9000
      STORAGE_ACCESS_KEY: aegis_minio
      STORAGE_SECRET_KEY: aegis_minio_secret
      STORAGE_BUCKET: aegis-documents
      FAISS_INDEX_DIR: /app/data/faiss_indices
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      N8N_BASE_URL: http://n8n:5678
      FRONTEND_BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/app
      - faiss_indices:/app/data/faiss_indices
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aegis:aegis@postgres:5432/aegis_ai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_ENDPOINT_URL: http://minio:9000
      STORAGE_ACCESS_KEY: aegis_minio
      STORAGE_SECRET_KEY: aegis_minio_secret
      STORAGE_BUCKET: aegis-documents
      FAISS_INDEX_DIR: /app/data/faiss_indices
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      N8N_BASE_URL: http://n8n:5678
      FRONTEND_BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - faiss_indices:/app/data/faiss_indices

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../workflows/grafana:/home/grafana/starter-dashboards:ro
    ports:
      - "3001:3000"   # host 3001 -> container 3000, since apps/web already uses host 3000
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  faiss_indices:
  ollama_data:
  n8n_data:
  prometheus_data:
  grafana_data:
