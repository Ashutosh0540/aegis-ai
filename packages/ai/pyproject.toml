[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aegis-ai-core"
version = "0.1.0"
description = "Shared embeddings, vector store, and LLM abstractions used by AegisAI's api and worker services."
requires-python = ">=3.12"

[tool.setuptools.packages.find]
include = ["aegis_ai_core*"]
